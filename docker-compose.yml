services:
  postgres:
    image: mirror.gcr.io/postgres:16
    container_name: dhs_crm_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dance_crm

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dance_crm"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres_test:
    image: mirror.gcr.io/postgres:16
    container_name: dhs_crm_postgres_test
    restart: unless-stopped

    profiles:
      - test

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dance_crm_test

    ports:
      - "5433:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dance_crm_test"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: